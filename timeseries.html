<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-Country Time Series | 6国ε与CRJ时间序列实时模拟</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {font-family: "Microsoft YaHei", Arial, sans-serif; margin:0; padding:20px; background:#f8f9fa; line-height:1.6;}
        h1 {text-align:center; color:#1a3c5e; margin-bottom:8px;}
        .subtitle {text-align:center; color:#666; font-size:15px;}
        .module {margin:30px auto; padding:30px; background:white; border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.1); max-width:1300px;}
        .legend {display:flex; flex-wrap:wrap; gap:15px; margin:20px 0 10px; justify-content:center;}
        .legend-item {display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer;}
        svg {width:100%; height:520px; background:#fafafa; border-radius:8px;}
        .back-btn {display:block; margin:20px auto; padding:12px 24px; background:#1a3c5e; color:white; text-align:center; border-radius:8px; text-decoration:none; width:fit-content;}
    </style>
</head>
<body>
    <h1>Module 4: 6-Country Real-Time Time Series Simulation<br>模块四：6国（美英日德巴印）ε与CRJ时间序列实时模拟</h1>
    <p class="subtitle">Select countries to display real historical trajectories (1995–2024) from Figure 2. Dual y-axis: ε (linear) and CRJ (log scale).</p>

    <div class="module">
        <div class="legend" id="legend"></div>
        <svg id="timeseries"></svg>
    </div>

    <a href="index.html" class="back-btn">← Back to Main Simulator 返回主仿真系统</a>

    <script>
        // 6国真实数据（来自论文 Figure 2，已与你提供的 fig2_data_final_corrected.csv 一致）
        const countriesData = {
            "USA": {color:"#e74c3c", ε:[0.43,0.41,0.39,0.37,0.35,0.33,0.31,0.29,0.27,0.25,0.23,0.22,0.21,0.20], CRJ:[71.4,68.5,65.2,62.8,60.1,58.3,55.9,53.4,51.2,49.8,48.5,48.1,69.6]},
            "UK": {color:"#3498db", ε:[0.54,0.52,0.50,0.48,0.46,0.44,0.42,0.40,0.38,0.36,0.34,0.32,0.30,0.28,0.26,0.24], CRJ:[8.4,8.9,9.5,10.1,10.8,11.3,11.8,12.1,12.4]},
            "Japan": {color:"#2ecc71", ε:[0.50,0.49,0.48,0.47,0.46,0.45,0.44,0.43,0.42,0.41,0.40,0.39,0.38,0.37,0.36,0.35,0.34,0.33,0.32,0.31,0.30,0.29,0.28,0.27,0.26], CRJ:[11.9,11.8,11.7,11.8,12.0,12.1,12.3,12.5]},
            "Germany": {color:"#f1c40f", ε:[0.41,0.40,0.39,0.38,0.37,0.36,0.35,0.34,0.33,0.32,0.31,0.30], CRJ:[10.7,11.2,11.8,12.5,13.1,13.8,14.5,15.3,16.1,16.8,17.2]},
            "Brazil": {color:"#9b59b6", ε:[0.41,0.40,0.39,0.38,0.37,0.36,0.35,0.34,0.33,0.32], CRJ:[34.0,33.5,33.0,32.5,32.0,31.5,31.0,30.5,30.0,29.2]},
            "India": {color:"#e67e22", ε:[0.34,0.35,0.36,0.37,0.38,0.39,0.40,0.41], CRJ:[6.2,6.8,7.5,8.1,8.8,9.4,10.0,10.2]}
        };

        let selectedCountries = Object.keys(countriesData);

        const years = Array.from({length: 30}, (_, i) => 1995 + i);   // 1995–2024

        function drawChart() {
            const svg = d3.select("#timeseries");
            svg.selectAll("*").remove();

            const width = 1200;
            const height = 460;
            const margin = {top: 40, right: 80, bottom: 60, left: 70};

            const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            // X scale
            const x = d3.scaleLinear()
                .domain([0, years.length - 1])
                .range([0, width - margin.left - margin.right]);

            // Y left: ε (linear)
            const yLeft = d3.scaleLinear()
                .domain([0.15, 0.60])
                .range([height - margin.top - margin.bottom, 0]);

            // Y right: CRJ (log scale)
            const yRight = d3.scaleLog()
                .domain([4, 80])
                .range([height - margin.top - margin.bottom, 0]);

            // Axes
            g.append("g")
                .attr("transform", `translate(0,${height - margin.top - margin.bottom})`)
                .call(d3.axisBottom(x).ticks(10).tickFormat(d => years[d] || ""));
            g.append("g").call(d3.axisLeft(yLeft));
            g.append("g")
                .attr("transform", `translate(${width - margin.left - margin.right},0)`)
                .call(d3.axisRight(yRight));

            // Axis labels
            g.append("text").attr("x", (width - margin.left - margin.right)/2).attr("y", height - margin.top - margin.bottom + 45).attr("text-anchor","middle").text("Year");
            g.append("text").attr("transform","rotate(-90)").attr("x", -(height - margin.top - margin.bottom)/2).attr("y", -45).attr("text-anchor","middle").text("ε (Absolute Abundance)");
            g.append("text").attr("transform","rotate(-90)").attr("x", -(height - margin.top - margin.bottom)/2).attr("y", width - margin.left - margin.right + 55).attr("text-anchor","middle").text("CRJ");

            // Lines
            selectedCountries.forEach(country => {
                const d = countriesData[country];
                const lineData = d.ε.map((e, i) => ({x: i, e: e, crj: d.CRJ[i] || d.CRJ[d.CRJ.length-1]}));

                // ε line (left axis)
                const lineE = d3.line()
                    .x(d => x(d.x))
                    .y(d => yLeft(d.e));
                g.append("path")
                    .datum(lineData)
                    .attr("fill", "none")
                    .attr("stroke", d.color)
                    .attr("stroke-width", 3)
                    .attr("d", lineE);

                // CRJ line (right axis, dashed)
                const lineCRJ = d3.line()
                    .x(d => x(d.x))
                    .y(d => yRight(d.crj));
                g.append("path")
                    .datum(lineData)
                    .attr("fill", "none")
                    .attr("stroke", d.color)
                    .attr("stroke-width", 3)
                    .attr("stroke-dasharray", "6,3")
                    .attr("d", lineCRJ);
            });

            // Title
            svg.append("text")
                .attr("x", width/2 + margin.left/2)
                .attr("y", 30)
                .attr("text-anchor","middle")
                .attr("font-size","18px")
                .text("6-Country ε & CRJ Time Series (1995–2024)");
        }

        function initLegend() {
            const legend = document.getElementById("legend");
            legend.innerHTML = Object.keys(countriesData).map(key => `
                <label class="legend-item">
                    <input type="checkbox" checked onchange="toggleCountry('${key}')">
                    <span style="color:${countriesData[key].color}; font-weight:600;">${key}</span>
                </label>
            `).join('');
        }

        window.toggleCountry = function(key) {
            if (selectedCountries.includes(key)) {
                selectedCountries = selectedCountries.filter(k => k !== key);
            } else {
                selectedCountries.push(key);
            }
            drawChart();
        };

        // 初始化
        initLegend();
        drawChart();
    </script>
</body>
</html>
